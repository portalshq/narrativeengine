name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            typescript/narrativeengine/package-lock.json
            typescript/nap-sdk/package-lock.json
      - name: Install Protobuf
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Codegen Tools
        run: |
          pip install grpcio-tools
          npm install --prefix typescript/narrativeengine ts-proto protoc-gen-ts_proto
      - name: Generate Protos
        run: just generate-protos
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: pip install ruff mypy pydantic
      - run: ruff check python/narrativeengine
      - run: mypy python/narrativeengine/narrativeengine
      - run: npm ci && npm run lint
        working-directory: typescript/narrativeengine

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            typescript/narrativeengine/package-lock.json
            typescript/nap-sdk/package-lock.json

      - name: Install Protobuf
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Codegen Tools
        run: |
          pip install grpcio-tools
          npm install --prefix typescript/narrativeengine ts-proto protoc-gen-ts_proto
      - name: Generate Protos
        run: just generate-protos

      - run: pip install maturin mypy pytest ruff pydantic
      - run: python -c "import shutil, pathlib; p = pathlib.Path('target/wheels'); shutil.rmtree(p, ignore_errors=True); p.mkdir(parents=True, exist_ok=True)"
      - run: maturin build --release --out ../../target/wheels
        working-directory: python/narrativeengine

      - run: npm ci
        working-directory: typescript/narrativeengine
      - run: npm run build
        working-directory: typescript/narrativeengine

      - run: cargo test --workspace --exclude narrativeengine-py --exclude nap-sdk-py --exclude nap-sdk-ts --exclude narrativeengine-ts

      - run: >-
          python -c "import pathlib, subprocess, sys; wheels = sorted(pathlib.Path('target/wheels').glob('narrativeengine-*.whl')); preferred = [w for w in wheels if 'manylinux' in w.name or 'musllinux' in w.name]; chosen = preferred[0] if preferred else wheels[0]; print(f'Installing wheel: {chosen}'); sys.exit(subprocess.call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(chosen)]))"
        shell: bash
      - run: pytest
        working-directory: python/narrativeengine

      - run: npm test
        working-directory: typescript/narrativeengine

      - run: ./scripts/test-parity.sh
        shell: bash
