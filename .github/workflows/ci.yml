name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint (deterministic — ubuntu only) ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: pip install -e "python[dev]"
      - run: ruff check python
      - run: mypy python/narrativeengine
      - run: npm ci && npm run lint
        working-directory: typescript

  # ── Build + test (platform-specific — 3 OS matrix) ─────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      # Build native binaries (release mode for distributable artifacts)
      - run: pip install maturin
      - run: python -c "import shutil, pathlib; p = pathlib.Path('target/wheels'); shutil.rmtree(p, ignore_errors=True); p.mkdir(parents=True, exist_ok=True)"
      - run: maturin build --release --out ../target/wheels
        working-directory: python

      # Build TypeScript SDK (includes native napi build)
      - run: npm ci
        working-directory: typescript
      - run: npm run build
        working-directory: typescript

      # Rust tests (debug mode — verifies all workspace crates compile)
      - run: cargo test --workspace --exclude narrativeengine-py

      # Python tests
      # Install from the pre-built wheel instead of `maturin develop`.
      # GitHub Actions runners have Python installed directly (no virtualenv),
      # so maturin develop fails with "Couldn't find a virtualenv".
      - run: pip install -e "python[dev]"
        shell: bash
      - run: python -c "import pathlib, subprocess, sys; wheels = sorted(pathlib.Path('target/wheels').glob('narrativeengine-*.whl')); preferred = [w for w in wheels if 'manylinux' in w.name or 'musllinux' in w.name]; chosen = preferred[0] if preferred else wheels[0]; print(f'Installing wheel: {chosen}'); sys.exit(subprocess.call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', str(chosen)]))"
        shell: bash
      - run: pytest python

      # TypeScript tests
      - run: npm test
        working-directory: typescript

      # Cross-runtime parity tests
      - run: ./scripts/test-parity.sh
        shell: bash
