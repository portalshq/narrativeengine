name: ci

on: [push, pull_request]

jobs:
  # ── Lint (deterministic — ubuntu only) ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: pip install -e "python[dev]"
      - run: ruff check python
      - run: mypy python/narrativeengine
      - run: npm install && npm run lint
        working-directory: typescript

  # ── Build + test (platform-specific — 3 OS matrix) ─────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}

      # Build native binaries (release mode for distributable artifacts)
      - run: pip install maturin
      - run: maturin build --manifest-path crates/narrativeengine-py/Cargo.toml --release

      # Build TypeScript SDK (includes native napi build)
      - run: npm install
        working-directory: typescript
      - run: npm run build
        working-directory: typescript

      # Rust tests (debug mode — verifies all workspace crates compile)
      - run: cargo test --workspace --exclude narrativeengine-py

      # Python tests
      - run: pip install -e "python[dev]"
      - run: maturin develop --manifest-path crates/narrativeengine-py/Cargo.toml --extras pydantic
      - run: pytest python

      # TypeScript tests
      - run: npm test
        working-directory: typescript

      # Cross-runtime parity tests
      - run: ./scripts/test-parity.sh
        shell: bash
