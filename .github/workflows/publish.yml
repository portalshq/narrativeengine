name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # ── Build native binaries for all platforms ─────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - run: pip install maturin
      - run: npm ci
        working-directory: typescript

      # Build napi-rs .node binary for this platform
      - run: npx napi build --cargo-cwd ../crates/narrativeengine-ts --platform --release
        working-directory: typescript

      # Build Python wheel for this platform
      - run: maturin build --release --out ../target/wheels
        working-directory: python

      # Upload napi binary
      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ runner.os }}
          path: typescript/*.node

      # Upload Python wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}
          path: target/wheels/*.whl

  # ── Publish everything to npm and PyPI ─────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - run: pip install twine
      - run: npm ci
        working-directory: typescript

      # Collect all platform .node binaries into one directory
      - uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          path: typescript/
          merge-multiple: true

      # Collect all platform wheels into one directory
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: target/wheels/
          merge-multiple: true

      # Pre-publish validation: version consistency + type freshness
      - run: node scripts/pre-publish-check.mjs

      # Build TypeScript types (uses up-to-date generated models, if any)
      - run: npm run build:types
        working-directory: typescript

      # Verify we have all expected platform binaries
      - run: ls -la typescript/*.node
      - run: ls -la target/wheels/

      # Publish Python wheels to PyPI
      - run: twine upload --skip-existing --username __token__ --password "${{ secrets.MATURIN_PYPI_TOKEN }}" target/wheels/*.whl

      # Publish TypeScript SDK to npm
      - run: npm publish --provenance --access public
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
