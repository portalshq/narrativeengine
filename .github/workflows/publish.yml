name: publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      # Build, test, and verify parity
      - run: pip install maturin
      - run: npm install
        working-directory: typescript
      - run: npm run build
        working-directory: typescript
      - run: cargo test --workspace --exclude narrativeengine-py
      - run: pip install -e "python[dev]"
      - run: maturin develop --manifest-path crates/narrativeengine-py/Cargo.toml --extras pydantic
      - run: pytest python
      - run: npm test
        working-directory: typescript
      - run: ./scripts/test-parity.sh
        shell: bash

      # Publish Python wheel to PyPI
      - name: Publish Python to PyPI
        run: |
          maturin build --release --manifest-path crates/narrativeengine-py/Cargo.toml
          maturin upload --skip-existing --username __token__ --password "${{ secrets.MATURIN_PYPI_TOKEN }}" "${{ github.workspace }}/target/wheels/*.whl"

      # Publish TypeScript SDK to npm
      - name: Publish TypeScript to npm
        run: npm publish --access public
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
