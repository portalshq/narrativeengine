name: publish-nap-python

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.run_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}~1
          filters: |
            run_build:
              - 'crates/nap-core/**'
              - 'python/nap-sdk/**'

  build:
    needs: check
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch == 'main'
      && needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install maturin
      - run: maturin build --release --out ../../target/wheels
        working-directory: python/nap-sdk

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-nap-${{ runner.os }}
          path: target/wheels/*.whl

  publish:
    needs: [check, build]
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch == 'main'
      && needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-nap-*
          path: target/wheels/
          merge-multiple: true

      - run: ls -la target/wheels/
      - run: twine upload --skip-existing --username __token__ --password "${{ secrets.MATURIN_PYPI_TOKEN }}" target/wheels/*.whl
