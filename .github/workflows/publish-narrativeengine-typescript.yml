name: publish-narrativeengine-typescript

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.run_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}~1
          filters: |
            run_build:
              - 'crates/narrativeengine/**'
              - 'typescript/narrativeengine/**'

  build:
    needs: check
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch == 'main'
      && needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci
        working-directory: typescript/narrativeengine

      - run: npx napi build --cargo-cwd . --platform --release
        working-directory: typescript/narrativeengine

      - uses: actions/upload-artifact@v4
        with:
          name: napi-narrativeengine-${{ runner.os }}
          path: typescript/narrativeengine/*.node

  publish:
    needs: [check, build]
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch == 'main'
      && needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        working-directory: typescript/narrativeengine

      - uses: actions/download-artifact@v4
        with:
          pattern: napi-narrativeengine-*
          path: typescript/narrativeengine/
          merge-multiple: true

      - run: npm run build:types
        working-directory: typescript/narrativeengine

      - run: ls -la typescript/narrativeengine/*.node

      - run: npm publish --access public
        working-directory: typescript/narrativeengine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
