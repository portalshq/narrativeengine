name: publish-narrativeengine-typescript

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci
        working-directory: typescript/narrativeengine

      - run: npx napi build --cargo-cwd . --platform --release --target ${{ matrix.target }}
        working-directory: typescript/narrativeengine

      - uses: actions/upload-artifact@v4
        with:
          name: napi-narrativeengine-${{ matrix.target }}
          path: typescript/narrativeengine/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        working-directory: typescript/narrativeengine

      - uses: actions/download-artifact@v4
        with:
          pattern: napi-narrativeengine-*
          path: typescript/narrativeengine/
          merge-multiple: true

      - run: npm run build:types
        working-directory: typescript/narrativeengine

      - run: ls -la typescript/narrativeengine/*.node

      - run: npm publish --access public
        working-directory: typescript/narrativeengine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
