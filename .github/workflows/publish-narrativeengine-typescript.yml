name: publish-narrativeengine-typescript

on:
  push:
    branches: [main]
    paths:
      - "crates/narrativeengine/**"
      - "typescript/narrativeengine/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci
        working-directory: typescript/narrativeengine

      - run: npx napi build --cargo-cwd . --platform --release
        working-directory: typescript/narrativeengine

      - uses: actions/upload-artifact@v4
        with:
          name: napi-narrativeengine-${{ runner.os }}
          path: typescript/narrativeengine/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        working-directory: typescript/narrativeengine

      - uses: actions/download-artifact@v4
        with:
          pattern: napi-narrativeengine-*
          path: typescript/narrativeengine/
          merge-multiple: true

      - run: npm run build:types
        working-directory: typescript/narrativeengine

      - run: ls -la typescript/narrativeengine/*.node

      - run: npm publish --access public
        working-directory: typescript/narrativeengine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
