name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cargo test --workspace --exclude narrativeengine-py
      - run: python -m pip install -e "python[dev]"
        shell: bash
      - run: maturin develop --manifest-path crates/narrativeengine-py/Cargo.toml --extras pydantic
      - run: python -m pytest python
      - run: npm install
        working-directory: typescript
      - run: npm run build
        working-directory: typescript
      - run: npm test
        working-directory: typescript
      - run: ./scripts/test-parity.sh
        shell: bash
