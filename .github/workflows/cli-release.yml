name: cli-release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            typescript/narrativeengine/package-lock.json
            typescript/nap-sdk/package-lock.json
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: pip install ruff mypy pydantic
      - run: ruff check python/narrativeengine
      - run: mypy python/narrativeengine/narrativeengine
      - run: npm ci && npm run lint
        working-directory: typescript/narrativeengine

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: >
          cargo test
          --locked
          --workspace
          --exclude narrativeengine-py
          --exclude nap-sdk-py
          --exclude nap-sdk-ts
          --exclude narrativeengine-ts

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: nap
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: nap
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: nap
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: nap.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --bin nap

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p artifacts
          NAME="nap-${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NAME="${NAME}.exe"
          fi
          cp \
            "target/${{ matrix.target }}/release/${{ matrix.bin }}" \
            "artifacts/${NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: nap-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/install.sh
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: |
          cp scripts/install.sh artifacts/install.sh
          chmod +x artifacts/install.sh
      - working-directory: artifacts
        run: |
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          generate_release_notes: true
          files: |
            artifacts/*
