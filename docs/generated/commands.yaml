  - name: "init"
    full_path: "init"
    about: "Initialize a repository repository and/or configure the backend provider"
    long_about: |
      Initialize a repository repository and/or configure the backend provider.
      
      When a repository name is provided, creates the repository structure (directories, config, repository manifest, initial commit). When --provider is given (or no provider is configured), sets up the backend provider. Both can be combined:
      
      nap init starwars                     # create repository nap init starwars --provider local    # create repository + configure provider nap init --provider local             # configure provider only
    usage: "Usage: init [OPTIONS] [REPOSITORY]"
    hidden: false
    arguments:
      - name: "repository"
        about: "Repository name. If provided, initializes a new repository repository"
        required: false
    options:
      - name: "provider"
        about: "Provider type: local, portals-cloud, or remote"
      - name: "remote_url"
        about: "Remote URL (required for remote provider)"
      - name: "workspace_id"
        about: "Workspace ID (for remote provider)"
      - name: "remote"
        about: "Remote URL to add as origin after init"
    flags:
      - name: "reset"
        about: "Reset the provider configuration file"
      - name: "help"
        about: "Print help (see more with '--help')"
